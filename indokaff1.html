      box-sizing:border-box;
    }
    body{

      background:#0f172a;
      color:white;
      padding:20px;
    }
    h1{text-align:center;margin-bottom:20px;}
    .menu{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }
    .menu button{
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }
    .menu button:hover{
      background:#38bdf8;
    }
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }
    .card{
      background:#1e293b;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
    }
    .card:hover{
      transform:translateY(-5px);
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }
    .info{
      padding:15px;
    }
    .title{
      font-size:18px;
      margin-bottom:10px;
    }
    .price{
      color:#38bdf8;
      font-weight:bold;
      margin-bottom:8px;
    }
    .rating{
      color:gold;
    }
  </style>
</head>
