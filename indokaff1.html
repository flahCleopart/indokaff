<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Produk</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }
    h1{text-align:center;margin-bottom:20px;}
    .menu{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }
    .menu button{
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }
    .menu button:hover{
      background:#38bdf8;
    }
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }
    .card{
      background:#1e293b;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
    }
    .card:hover{
      transform:translateY(-5px);
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }
    .info{
      padding:15px;
    }
    .title{
      font-size:18px;
      margin-bottom:10px;
    }
    .price{
      color:#38bdf8;
      font-weight:bold;
      margin-bottom:8px;
    }
    .rating{
      color:gold;
    }
  </style>
</head>
<body>

<h1>Market Produk</h1>

<div class="menu">
  <button onclick="showCategory('parfum')">Parfum</button>
  <button onclick="showCategory('sabun')">Sabun</button>
</div>

<div class="products" id="products"></div>

<script>
const data = {
  parfum: [
    {
      title:"Parfum Dior",
      price:"Rp120.000",
      image:"Sotener.jpg", // gambar lokal
      rating:"4.9"
    },
    {
      title:"Parfum Chanel",
      price:"Rp150.000",
      image:"Sotener.jpg", // gambar lokal
      rating:"5.0"
    }
  ],

  sabun: [
    { title:"3in1 ProSmart (CS,RB,SP,SW)", price:"Rp33.000", image:"3in1.png", rating:"4.7" },
    { title:"Sabun Cuci Piring ProSmart (Besar)", price:"Rp24.000", image:"CupiPS.jpg", rating:"4.8" },
    { title:"Detergen INDOKAFF (1 Liter)", price:"Rp13.000", image:"detergen.png", rating:"4.8" },
    { title:"SOFTENER (PINK,BLUE)", price:"Rp24.000", image:"softener.png", rating:"4.8" },
    { title:"Pel Lavender (BB)", price:"Rp17.500", image:"sabun1.jpg", rating:"4.6" },
    { title:"BRM", price:"Rp23.000", image:"brm.png", rating:"4.7" },
    { title:"Sabun cuci tangan INDOKAFF(1 LITER)", price:"Rp13.000", image:"sabun3.jpg", rating:"4.8" },
    { title:"Sabun pembersih kaca (BB)", price:"Rp12.000", image:"sabun4.jpg", rating:"4.5" },
    { title:"Karbol lavender(BB)", price:"Rp17.500", image:"risol.png", rating:"4.7" },
    { title:"SERE (BB)", price:"Rp27.500", image:"sabun6.jpg", rating:"4.9" },
    { title:"Semir mobil oren(1lt)", price:"Rp50.000", image:"semiro.jpg", rating:"4.6" },
    { title:"Semir mobil putih(BK)", price:"Rp35.000", image:"semirp.jpg", rating:"4.7" },
    { title:"Bubuk ajaib", price:"Rp25.000", image:"sabun9.jpg", rating:"4.8" },
    { title:"Anti kerak mesin(BK)", price:"Rp27.000", image:"akm.jpg", rating:"4.7" },
    { title:"Matic BLUE", price:"Rp27.500", image:"detergen.png", rating:"4.8" }
  ]
};

const container = document.getElementById('products');

function showCategory(category){
  container.innerHTML = "";
  data[category].forEach(product => {
    container.innerHTML += `
      <div class="card">
        <img src="${product.image}" alt="${product.title}">
        <div class="info">
          <div class="title">${product.title}</div>
          <div class="price">${product.price}</div>
          <div class="rating">⭐ ${product.rating}</div>
        </div>
      </div>
    `;
  });
}

// default tampilkan parfum
showCategory('parfum');
</script>

</body>
</html>
