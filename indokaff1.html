<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:38px;
  color:#38bdf8;
}

.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.menu button{
  padding:12px 24px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

.menu button:hover{
  background:#38bdf8;
  transform:scale(1.05);
}

.search-box{
  max-width:500px;
  margin:0 auto 30px;
}

.search-box input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  font-size:16px;
  outline:none;
}

.search-box input::placeholder{
  color:#94a3b8;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 12px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 18px rgba(56,189,248,0.5);
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.price{
  color:#38bdf8;
  font-weight:bold;
  font-size:18px;
  margin-bottom:8px;
}

.rating{
  color:gold;
  margin-bottom:15px;
}

.buy-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#0f172a;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.buy-btn:hover{
  background:white;
}

.not-found{
  text-align:center;
  font-size:20px;
  color:#94a3b8;
  margin-top:30px;
  grid-column:1/-1;
}

</style>
</head>

const container = document.getElementById('products');

let currentCategory = "ultra";

function renderProducts(products){

  container.innerHTML = "";

  if(products.length === 0){

    container.innerHTML = `
      <div class="not-found">
        Produk tidak ditemukan
      </div>
    `;

    return;
  }

  products.forEach(product => {

    container.innerHTML += `

      <div class="card">

        <img src="${product.image}" alt="${product.title}">

        <div class="info">

          <div class="title">${product.title}</div>

          <div class="price">${product.price}</div>

          <div class="rating">⭐ ${product.rating}</div>

          <button class="buy-btn" onclick="buyProduct('${product.title}')">
            Beli Sekarang
          </button>

        </div>

      </div>

    `;
  });
}

function showCategory(category){

  currentCategory = category;

  document.getElementById("searchInput").value = "";

  renderProducts(data[category]);
}

function searchProduct(){

  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = data[currentCategory].filter(product =>
    product.title.toLowerCase().includes(keyword)
  );

  renderProducts(filtered);
}

function buyProduct(productName){

  const nomorWA = "6285799872638";

  const pesan = `Halo, saya ingin membeli ${productName}`;

  const url = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;

  window.open(url, "_blank");
}
